<!doctype html>
<html lang="ja">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHC0WDCVJX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-CHC0WDCVJX");
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>無限ドリル | 正負の数（加減-整数・分数・小数）</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- サイドバー -->
      <div id="sidebar"></div>
      <!-- メイン -->
      <main class="content">
        <!-- 設定 -->
        <section class="panel settings-panel">
          <h2 class="panel-title">設定</h2>
          <p class="panel-subtitle">問題の内容や難易度を選んでください。</p>

          <div class="settings-grid">
            <!-- 数の種類（NEW） -->
            <div class="field">
              <label>出題タイプ</label>
              <select id="numberMode">
                <option value="int">整数のみ</option>
                <option value="fraction">分数のみ</option>
                <option value="decimal">小数のみ</option>
                <option value="int_fraction">整数＋分数</option>
                <option value="int_decimal">整数＋小数</option>
              </select>
            </div>

            <input type="hidden" id="calcType" value="addsub" />

            <!-- 桁数 -->
            <div class="field">
              <label>整数の桁数</label>
              <div class="inline-checkbox-group">
                <label
                  ><input
                    type="checkbox"
                    name="digit"
                    value="1"
                    checked
                  />1桁</label
                >
                <label
                  ><input type="checkbox" name="digit" value="2" />2桁</label
                >
                <label
                  ><input type="checkbox" name="digit" value="3" />3桁</label
                >
              </div>
            </div>

            <!-- 問題数 -->
            <div class="field">
              <label for="problemCount">問題数</label>
              <input
                id="problemCount"
                type="number"
                min="1"
                max="60"
                value="20"
              />
            </div>

            <!-- 項数 -->
            <div class="field">
              <label for="termCount">項数</label>
              <input id="termCount" type="number" min="2" max="6" value="2" />
            </div>

            <!-- 計算オプション -->
            <div class="field checkbox-group">
              <label class="checkbox-label">
                <input id="usePower" type="checkbox" />
                累乗を使う
              </label>

              <div id="powerOptions" class="power-options">
                <label class="power-label">
                  <input type="checkbox" name="power" value="2" checked />
                  2乗
                </label>
                <label class="power-label">
                  <input type="checkbox" name="power" value="3" />
                  3乗
                </label>
                <label class="power-label">
                  <input type="checkbox" name="power" value="4" />
                  4乗
                </label>
              </div>
            </div>
          </div>

          <!-- ボタン -->
          <div class="actions">
            <button class="action-button" id="generateButton">
              問題を作る
            </button>
            <button class="action-button secondary" id="printQuestionButton">
              問題を印刷
            </button>
            <button class="action-button secondary" id="printAnswerButton">
              答えを印刷
            </button>
            <button class="action-button secondary" id="pdfQuestionButton">
              問題をPDF出力
            </button>
            <button class="action-button secondary" id="pdfAnswerButton">
              答えをPDF出力
            </button>
          </div>
        </section>

        <!-- 問題表示 -->
        <section class="panel problems-panel">
          <div class="print-header">
            <div class="print-row">
              <span>日付：</span><span class="line"></span> <span>クラス：</span
              ><span class="line"></span> <span>番号：</span
              ><span class="line small"></span> <span>名前：</span
              ><span class="line large"></span>
            </div>
          </div>
          <div class="problem-header">
            <div class="problem-title-wrap">
              <h2 class="problem-title" id="sheetTitle">
                正負の数（加減-整数・分数・小数）
              </h2>
              <div class="problem-note" id="sheetNote">
                設定して「問題を作る」を押すとここに表示されます。
              </div>
            </div>
          </div>

          <div id="sheet" class="sheet"></div>

          <div id="emptyState" class="empty-state">
            まだ問題が作られていません。<br />
            設定を選んで「問題を作る」を押してください。
          </div>
        </section>
      </main>
    </div>

    <div id="pdfModal" class="pdf-modal">
      <div class="pdf-modal-content">
        <p>
          印刷画面で「送信先」を<br /><strong>PDFに保存</strong
          >に変更してください
        </p>
        <button id="pdfModalOk">OK</button>
      </div>
    </div>

    <div id="alertModal" class="pdf-modal">
      <div class="pdf-modal-content">
        <p>先に問題を作ってください</p>
        <button id="alertModalOk">OK</button>
      </div>
    </div>

    <!-- JS -->
    <script src="js/layout/sidebar.js"></script>
    <script src="js/layout/footer.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/generatorFraction.js"></script>
    <script src="js/generator.js"></script>
    <script src="js/printer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
